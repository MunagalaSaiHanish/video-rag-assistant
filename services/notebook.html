<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .panel { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 overflow-hidden">
    <div class="flex h-screen">
        <!-- Top Nav -->
        <nav class="fixed top-0 left-0 right-0 z-50 bg-zinc-900 border-b border-zinc-800 px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-violet-500 rounded-2xl flex items-center justify-center text-white text-xl font-bold">N</div>
                    <span class="text-xl font-semibold tracking-tight">Notebook</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="createNewNotebook()" class="flex items-center gap-2 bg-white text-zinc-950 hover:bg-white/90 px-5 py-2 rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-plus"></i> Create notebook
                </button>
                <button onclick="showProfileMenu()" class="w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center text-white font-medium cursor-pointer">J</button>
            </div>
        </nav>

        <div class="flex flex-1 pt-16">
            <!-- LEFT PANEL -->
            <div id="left-panel" class="panel w-80 bg-zinc-900 border-r border-zinc-800 flex flex-col">
                <div class="p-4 border-b border-zinc-800 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-clock-rotate-left text-yellow-400"></i>
                        <h2 class="font-semibold">History</h2>
                    </div>
                    <button onclick="toggleLeftPanel()" class="text-zinc-400 hover:text-white p-1"><i class="fa-solid fa-chevron-left"></i></button>
                </div>
                <div id="history-list" class="flex-1 overflow-auto p-3"></div>
                <div class="p-4 border-t border-zinc-800">
                    <button onclick="clearWorkspace()" class="w-full py-3 rounded-2xl text-red-400 hover:bg-red-500/10">Clear workspace</button>
                </div>
            </div>

            <!-- CENTER -->
            <div class="flex-1 flex flex-col bg-zinc-950 relative">
                <button id="left-reopen-btn" onclick="toggleLeftPanel()" class="hidden absolute left-4 top-6 bg-zinc-900 border border-zinc-700 p-3 rounded-2xl z-50">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>

                <div class="px-8 py-6 border-b border-zinc-800">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-indigo-500 rounded-3xl flex items-center justify-center">
                                <i class="fa-solid fa-book text-white"></i>
                            </div>
                            <div>
                                <h1 class="text-2xl font-semibold">Untitled notebook</h1>
                                <p class="text-zinc-400 text-sm">0 sources • Jul 9, 2026</p>
                            </div>
                        </div>
                        <button onclick="customizeNotebook()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm">Customize</button>
                    </div>
                </div>
                <div id="chat-area" class="flex-1 p-8 overflow-auto"></div>
            </div>

            <!-- RIGHT PANEL -->
            <div id="right-panel" class="panel w-96 bg-zinc-900 border-l border-zinc-800 flex flex-col">
                <div class="p-4 border-b border-zinc-800 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-layer-group text-emerald-400"></i>
                        <h2 class="font-semibold">Resources</h2>
                    </div>
                    <button onclick="toggleRightPanel()" class="text-zinc-400 hover:text-white p-1"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="p-4">
                    <button onclick="showAddResourceModal()" class="w-full border border-dashed border-zinc-600 hover:border-yellow-400 py-12 rounded-3xl text-center">
                        <i class="fa-solid fa-plus text-3xl mb-3 block"></i>
                        <span class="font-medium">Add sources</span>
                    </button>
                </div>
                <div id="resources-list" class="flex-1 overflow-auto p-4"></div>
                <div class="p-4 border-t border-zinc-800">
                    <button onclick="analyzeResources()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-3xl font-medium">Analyze</button>
                </div>
            </div>

            <!-- Right Reopen -->
            <button id="right-reopen-btn" onclick="toggleRightPanel()" class="hidden absolute right-4 top-6 bg-zinc-900 border border-zinc-700 p-3 rounded-2xl z-50">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
        </div>
    </div>

    <script>
        function toggleLeftPanel() {
            const panel = document.getElementById('left-panel');
            const btn = document.getElementById('left-reopen-btn');
            if (panel.style.width === '0px') {
                panel.style.width = '320px';
                btn.classList.add('hidden');
            } else {
                panel.style.width = '0px';
                setTimeout(() => btn.classList.remove('hidden'), 400);
            }
        }

        function toggleRightPanel() {
            const panel = document.getElementById('right-panel');
            const btn = document.getElementById('right-reopen-btn');
            if (panel.style.width === '0px' || !panel.style.width) {
                panel.style.width = '384px';
                btn.classList.add('hidden');
            } else {
                panel.style.width = '0px';
                setTimeout(() => btn.classList.remove('hidden'), 400);
            }
        }

        function showAddResourceModal() { alert("Add sources modal (Demo)"); }
        function analyzeResources() { alert("Analyzing resources..."); }
        function clearWorkspace() { if(confirm("Clear workspace?")) location.reload(); }
        function createNewNotebook() { alert("New notebook created"); }
        function customizeNotebook() { alert("Customize"); }
        function showProfileMenu() { alert("Profile"); }

        window.onload = () => console.log("NotebookLM Theme Applied");
    </script>
</body>
</html>
